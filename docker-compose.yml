# TigerDuck backend stack.
#
# Networks:
#   * tigerduck-db   — internal-only bridge. postgres lives here alone and the
#                      backend joins to talk to it. internal:true means the
#                      network has NO outbound NAT, so postgres cannot reach
#                      the public internet even if it tried.
#   * proxy-net      — shared with nginx-proxy-manager. External. NPM proxies
#                      api.tigerduck.app to `http://tigerduck-internal:40000`
#                      over this network (container DNS by name). Only the
#                      backend joins this — postgres stays off it.
#
# No ports are published to the host for either service. Everything reaches
# the backend through nginx-proxy-manager via proxy-net. Postgres is reachable
# only from the backend, via tigerduck-db.
#
# llama-server stays NATIVE on the host (Docker Desktop on Mac can't surface
# Metal GPU). The backend reaches it via Docker Desktop's host-gateway:
# TIGERDUCK_LLM_BASE_URL=http://host.docker.internal:40001/v1 in .env.

name: tigerduck

services:
  postgres:
    image: postgres:17-alpine
    container_name: tigerduck-db
    restart: unless-stopped
    networks: [tigerduck-db]
    environment:
      POSTGRES_USER: tigerduck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tigerduck
      # Log timestamps in local time for easier readability. Storage stays UTC
      # (TIMESTAMPTZ columns are always UTC internally).
      TZ: Asia/Taipei
    volumes:
      - tigerduck_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tigerduck -d tigerduck"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    # container_name doubles as the DNS name that nginx-proxy-manager uses
    # over proxy-net. Do NOT change without updating NPM's proxy target.
    container_name: tigerduck-internal
    restart: unless-stopped
    networks: [tigerduck-db, proxy-net]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    # Mount the APNs auth key read-only. Also makes cert rotation a host-side
    # operation (drop the new .p8, restart container) instead of a rebuild.
    volumes:
      - ./server/secrets:/app/server/secrets:ro
    # host-gateway resolves `host.docker.internal` to the Docker host. Needed
    # on Linux for parity with Mac (on macOS Docker Desktop sets this for free,
    # explicit entry is harmless).
    extra_hosts:
      - "host.docker.internal:host-gateway"

  portal:
    build: ./portal
    container_name: tigerduck-portal
    restart: unless-stopped
    # tigerduck-db so the status page can directly query postgres + export
    # can pg_dump; proxy-net so nginx-proxy-manager / cloudflared can
    # reach it in prod. The dev override swaps proxy-net for a host bridge
    # so port 40010 publishes.
    networks: [tigerduck-db, proxy-net]
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      # Set by _compose-files.sh (sourced by start.sh) — the portal has
      # no view of the host's network interfaces from inside its netns,
      # so we hand it the comma-joined IPs to render on the status page.
      TIGERDUCK_HOST_LAN_IPS: ${TIGERDUCK_HOST_LAN_IPS:-}
    volumes:
      # SQLite + audit log persist across container recreate.
      - tigerduck_portal_data:/data
      # Read-only docker socket lets the status page talk to the engine
      # API (HTTP-over-UDS) for `containers/{name}/json`. NO write ops
      # (start/stop/restart) per the design: the import flow asks the
      # user to restart manually.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Mirror the backend's secrets mount RO so the status page can
      # report "is the .p8 / fcm.json on disk?" without exposing contents.
      - ./server/secrets:/backend-secrets:ro

networks:
  tigerduck-db:
    # Explicit name avoids the "<project>_<key>" prefix that compose adds by
    # default, so the network is predictably named regardless of where it is
    # invoked from.
    name: tigerduck-db
    # internal:true → no NAT to the host's default route. Postgres has no path
    # to the public internet from this network.
    internal: true
  proxy-net:
    external: true

volumes:
  tigerduck_pgdata:
  tigerduck_portal_data:
