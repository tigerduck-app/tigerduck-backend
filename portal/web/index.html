<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/static/favicon.png" />
    <link rel="apple-touch-icon" href="/static/tigerduck-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TigerDuck Backend Portal</title>
    <link
      rel="stylesheet"
      href="https://rsms.me/inter/inter.css"
    />
    <script>
      // Inline so the .dark class lands on <html> before the first
      // paint — otherwise the body briefly flashes in light mode while
      // React boots and reads localStorage. Mirrors the resolver inside
      // hooks/use-theme.ts; keep them in sync.
      (function () {
        try {
          var stored = localStorage.getItem("tigerduck.portal.theme");
          var theme = stored === "light" || stored === "dark" ? stored : "system";
          var resolved =
            theme === "system"
              ? window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light"
              : theme;
          document.documentElement.classList.toggle("dark", resolved === "dark");
          document.documentElement.style.colorScheme = resolved;
        } catch (_) {
          // localStorage unavailable; fall back to light (the default
          // CSS variables, no .dark class).
        }
      })();
    </script>
  </head>
  <body class="h-full bg-background text-foreground antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
