<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TigerDuck Backend Portal{% endblock %}</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="apple-touch-icon" href="/static/tigerduck-logo.png">
    <link rel="stylesheet" href="/static/portal.css">
</head>
<body class="{% block body_class %}{% endblock %}">
<header>
    <a class="brand" href="/">
        <img src="/static/tigerduck-logo.png" alt="TigerDuck" class="brand-logo">
        <span class="brand-title"><strong>TigerDuck</strong> <span class="dim">Backend Portal</span></span>
    </a>
    <nav>
        <a href="/">Status</a>
        <a href="/logs">Logs</a>
        <a href="/backup">Backup</a>
        <a href="/custom-push">Custom push</a>
    </nav>
</header>

<main>
{% block body %}{% endblock %}
</main>

<footer>
    <span class="dim">TigerDuck Backend Portal.</span>
</footer>
</body>
</html>
